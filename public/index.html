<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101820">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Activity Rooms">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Activity Rooms</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section id="setup" class="setup">
        <div class="brand">
          <div class="mark" aria-hidden="true">A</div>
          <div>
            <h1 data-i18n="title">Activity Rooms</h1>
            <p data-i18n="subtitle">Fast mobile board game for friends on different devices.</p>
          </div>
        </div>

        <form id="entryForm" class="panel">
          <label>
            <span data-i18n="yourName">Your name</span>
            <input id="nameInput" autocomplete="name" maxlength="24" required>
          </label>

          <label>
            <span data-i18n="roomCode">Room code</span>
            <input id="codeInput" maxlength="5" inputmode="text" autocomplete="off">
          </label>

          <div class="segmented" role="group" aria-label="Language">
            <button type="button" id="englishBtn" class="active">English</button>
            <button type="button" id="serbianBtn">Srpski</button>
          </div>

          <div class="actions">
            <button type="submit" id="joinBtn" class="primary" data-i18n="joinRoom">Join room</button>
            <button type="button" id="createBtn" data-i18n="createRoom">Create room</button>
          </div>

          <p id="error" class="error" role="alert"></p>
        </form>
      </section>

      <section id="game" class="game hidden">
        <header class="topbar">
          <div>
            <span class="eyebrow" data-i18n="room">Room</span>
            <button id="copyCode" class="room-code" title="Copy room code"></button>
          </div>
          <div class="segmented compact" role="group" aria-label="Language">
            <button type="button" id="gameEnglishBtn">EN</button>
            <button type="button" id="gameSerbianBtn">SR</button>
          </div>
        </header>

        <section class="turn-panel">
          <div class="turn-head">
            <div>
              <span class="eyebrow" data-i18n="turn">Turn</span>
              <h2 id="turnName">-</h2>
            </div>
            <div id="timer" class="timer">60</div>
          </div>

          <div id="cardFace" class="card-face card-empty">
            <div class="card-inner">
              <div class="activity-card card-back">
                <span class="card-brand">Activity</span>
                <span class="card-original">Original</span>
                <strong id="cardBackNumber">?</strong>
              </div>
              <div class="activity-card card-front">
                <span id="category" class="category">-</span>
                <div class="term-row">
                  <span id="cardIcon" class="term-icon"></span>
                  <strong id="word">-</strong>
                </div>
              </div>
            </div>
          </div>

          <div id="difficultyChoices" class="difficulty-choices" aria-label="Card difficulty">
            <button type="button" data-difficulty="3">3</button>
            <button type="button" data-difficulty="4">4</button>
            <button type="button" data-difficulty="5">5</button>
          </div>

          <div class="actions">
            <button type="button" id="correctBtn" class="primary" data-i18n="correct">Correct</button>
            <button type="button" id="skipBtn" data-i18n="skip">Skip</button>
            <button type="button" id="startBtn" class="primary" data-i18n="startGame">Start game</button>
            <button type="button" id="restartBtn" data-i18n="newGame">New game</button>
          </div>

          <div id="specialControls" class="special-controls hidden"></div>
        </section>

        <section class="board-wrap">
          <div id="board" class="board" aria-label="Score board"></div>
        </section>

        <section class="players">
          <div class="section-title">
            <h3 data-i18n="players">Players</h3>
            <span id="capacity">0/8</span>
          </div>
          <div id="playerList" class="player-list"></div>
        </section>

        <section class="activity-log">
          <div class="section-title">
            <h3 data-i18n="latest">Latest</h3>
          </div>
          <div id="log"></div>
        </section>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
  </body>
</html>
